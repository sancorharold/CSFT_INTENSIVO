{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ADAY | Mapa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'css/map.css' %}">
</head>
<body>

<!-- MENU DESPLEGABLE -->
<div class="side-menu" id="sideMenu">
    <h3>ADAY</h3>
    <a href="{% url 'core:home' %}">🏠 Inicio</a>
    <a href="{% url 'core:map' %}">🗺️ Mapa</a>
    <a href="#">❤️ Favoritos</a>
    <a href="#">👤 Perfil</a>
    <a href="{% url 'core:logout' %}">🚪 Cerrar sesión</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- TOP BAR -->
<div class="top-bar">
    <i class="fas fa-bars menu-btn" id="menuBtn"></i>
    <div class="app-title">ADAY</div>
</div>

<!-- SEARCH -->
<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="mapSearch" placeholder="Buscar destinos...">
    </div>
</div>

<!-- CONTENT -->
<div class="content map-content">

    <!-- Loading -->
    <div class="map-loading" id="mapLoading">
        <div class="spinner"></div>
        <p>Cargando mapa...</p>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- Map Controls -->
    <div class="map-controls">
        <button id="zoomIn">➕</button>
        <button id="zoomOut">➖</button>
        <button id="myLocation">📍</button>
    </div>

</div>

<!-- FLOAT BUTTON (reutilizado) -->
<div class="float-btn">
    <i class="fas fa-camera"></i>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <a href="{% url 'core:home' %}">
        <i class="fa-regular fa-compass"></i>
        Explorar
    </a>
    <a href="{% url 'core:map' %}" class="active">
        <i class="fa-regular fa-map"></i>
        Mapa
    </a>
    <a href="#">
        <i class="fa-regular fa-heart"></i>
        Favoritos
    </a>
    <a href="#">
        <i class="fa-regular fa-user"></i>
        Perfil
    </a>
</div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{% static 'js/home.js' %}"></script>
<script src="{% static 'js/map.js' %}"></script>

</body>
</html>
