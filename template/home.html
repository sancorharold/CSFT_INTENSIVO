<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ADAY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #faf7ef;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: #0b78ff;
            color: white;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        /* ===== SEARCH ===== */
        .search-container {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f2f2f2;
            border-radius: 25px;
            padding: 10px 14px;
        }

        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 14px;
            outline: none;
            margin-left: 8px;
        }

        /* ===== CONTENT ===== */
        .content {
            padding: 16px;
        }

        .content h3 {
            margin-bottom: 14px;
        }

        /* ===== CARDS ===== */
        .cards {
            display: flex;
            gap: 14px;
            overflow-x: auto;
        }

        .card {
            background: white;
            border-radius: 14px;
            min-width: 260px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .heart {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: red;
            font-size: 14px;
        }

        .card-body {
            padding: 12px;
        }

        .card-body h4 {
            margin: 0;
            font-size: 16px;
        }

        /* ===== FLOAT BUTTON ===== */
        .float-btn {
            position: fixed;
            right: 20px;
            bottom: 90px;
            width: 56px;
            height: 56px;
            background: #0b78ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }

        .bottom-nav div {
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .bottom-nav .active {
            color: #0b78ff;
        }

        .bottom-nav i {
            font-size: 18px;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div>ADAY</div>
    <i class="fas fa-bars"></i>
</div>

<!-- SEARCH -->
<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Buscar destinos...">
    </div>
</div>

<!-- CONTENT -->
<div class="content">
    <h3>Sitios que podrían interesarte</h3>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505678261036-a3fcc5e884ee" alt="">
            <div class="heart"><i class="fa-regular fa-heart"></i></div>
            <div class="card-body">
                <h4>Machu Picchu</h4>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad" alt="">
            <div class="heart"><i class="fa-regular fa-heart"></i></div>
            <div class="card-body">
                <h4>Cartagena</h4>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="">
            <div class="heart"><i class="fa-regular fa-heart"></i></div>
            <div class="card-body">
                <h4>Torres del Paine</h4>
            </div>
        </div>

    </div>
</div>

<!-- FLOAT BUTTON -->
<div class="float-btn">
    <i class="fas fa-camera"></i>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <div class="active">
        <i class="fa-regular fa-compass"></i>
        Explorar
    </div>
    <div>
        <i class="fa-regular fa-map"></i>
        Mapa
    </div>
    <div>
        <i class="fa-regular fa-heart"></i>
        Favoritos
    </div>
    <div>
        <i class="fa-regular fa-user"></i>
        Perfil
    </div>
</div>

</body>
</html>
