{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ADAY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'CSS/home.css' %}">
</head>
<body>

<!-- MENU DESPLEGABLE -->
<div class="side-menu" id="sideMenu">
    <h3>ADAY</h3>
    <a href="{% url 'core:home' %}">🏠 Inicio</a>
    <a href="#">🗺️ Mapa</a>
    <a href="#">❤️ Favoritos</a>
    <a href="#">👤 Perfil</a>
    <a href="{% url 'core:logout' %}">🚪 Cerrar sesión</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- TOP BAR -->
<div class="top-bar">
    <i class="fas fa-bars menu-btn" id="menuBtn"></i>
    <div class="app-title">ADAY</div>
</div>

<!-- SEARCH -->
<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Buscar destinos...">
    </div>
</div>

<!-- CONTENT -->
<div class="content">
    <h3>Sitios que podrían interesarte</h3>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505678261036-a3fcc5e884ee">
            <div class="heart"><i class="fa-regular fa-heart"></i></div>
            <div class="card-body">
                <h4>Machu Picchu</h4>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad">
            <div class="heart"><i class="fa-regular fa-heart"></i></div>
            <div class="card-body">
                <h4>Cartagena</h4>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
            <div class="heart"><i class="fa-regular fa-heart"></i></div>
            <div class="card-body">
                <h4>Torres del Paine</h4>
            </div>
        </div>

    </div>
</div>

<!-- FLOAT BUTTON -->
<div class="float-btn">
    <i class="fas fa-camera"></i>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <a href="{% url 'core:home' %}" class="active">
        <i class="fa-regular fa-compass"></i>
        Explorar
    </a>
    <a href="{% url 'core:map' %}">
        <i class="fa-regular fa-map"></i>
        Mapa
    </a>
    <a href="#">
        <i class="fa-regular fa-heart"></i>
        Favoritos
    </a>
    <a href="#">
        <i class="fa-regular fa-user"></i>
        Perfil
    </a>
</div>

<!-- JS -->
<script src="{% static 'JS/home.js' %}"></script>

</body>
</html>
